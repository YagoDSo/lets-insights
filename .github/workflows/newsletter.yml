name: Let's Insights — newsletter semanal

# Roda toda segunda. GitHub Actions usa UTC; 09:00 UTC = 06:00 BRT (UTC-3).
# Também pode ser disparado manualmente pela aba Actions (workflow_dispatch).
on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

# Etapas ENCADEADAS de verdade: cada job só começa se o anterior passar (needs).
# Sem mais "espero 4 minutos e rezo".
jobs:
  wf01-coleta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run wf01
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ secrets.CLAUDE_MODEL }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEETS_DOC_ID: ${{ secrets.SHEETS_DOC_ID }}

  wf02-curadoria:
    needs: wf01-coleta
    runs-on: ubuntu-latest
    # contents:write necessário pra commitar a imagem gerada via IA (fallback) — ver lib/gitAssets.js
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run wf02
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ secrets.CLAUDE_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEETS_DOC_ID: ${{ secrets.SHEETS_DOC_ID }}

  wf03-montagem-envio:
    needs: wf02-curadoria
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run wf03
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEETS_DOC_ID: ${{ secrets.SHEETS_DOC_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PREVIEW_TO: ${{ secrets.PREVIEW_TO }}
